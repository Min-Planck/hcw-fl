base: &base_config
  decay_rate: 0.995
  fraction_fit: 0.5
  fraction_evaluate: 0.0
  min_fit_clients: 2
  min_evaluate_clients: 2
  min_available_clients: 2
  learning_rate: 0.01
  num_rounds: 10
  num_clients: 40
  local_training_epochs: 1
  batch_size: 32
  seed_value: 42 
  shards: [2, 2, 3]
  partition_fraction: [0.3, 0.3, 0.3, 0.1]
  partition_alpha: [0.01, 0.05, 0.1, 100] 

fedavg: 
  <<: *base_config

fedavgm: 
  <<: *base_config
  server_learning_rate: 1.0
  server_momentum: 0.0

fedadp: 
  <<: *base_config
  alpha: 5

fedimp: 
  <<: *base_config
  temperature: 0.7 

fedcls: 
  <<: *base_config
  alpha: 0.5 

feddisco: 
  <<: *base_config
  alpha: 0.5
  beta:  0.1

fedntd: 
  <<: *base_config
  tau: 3
  beta: 1

moon:
  <<: *base_config
  temperature: 1.5

scaffold:
  <<: *base_config

fedhcw: 
  <<: *base_config
  alpha: 5
  temperature: 0.7
  distance: 'hellinger'

fedaaw: 
  <<: *base_config
  beta: 0.01
  gamma: 1.0